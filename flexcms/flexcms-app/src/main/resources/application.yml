# ==============================================================================
# FlexCMS - Base Application Configuration
# ==============================================================================

spring:
  application:
    name: flexcms

  # ----- Database -----
  datasource:
    url: jdbc:postgresql://localhost:5432/flexcms
    username: flexcms
    password: flexcms
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # ----- JPA -----
  # ddl-auto and show-sql only apply to the auto-configured JPA (disabled).
  # Each datasource config (CmsDataSourceConfig, PimDataSourceConfig) sets
  # hibernate.hbm2ddl.auto=validate explicitly.
  jpa:
    open-in-view: false

  # ----- Flyway -----
  # Disabled: Flyway is configured explicitly per-datasource in CmsDataSourceConfig
  # and PimDataSourceConfig to avoid multi-datasource interference.
  flyway:
    enabled: false

  # ----- Redis -----
  data:
    redis:
      host: localhost
      port: 6379

  # ----- Elasticsearch -----
  elasticsearch:
    uris: http://localhost:9200

  # ----- RabbitMQ -----
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ----- Security / OAuth2 Resource Server -----
  # Configure the JWT issuer URI for your IdP:
  #   Keycloak: http://<host>:8180/realms/<realm>
  #   Auth0:    https://<tenant>.auth0.com/
  #   Okta:     https://<domain>/oauth2/default
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${FLEXCMS_JWT_ISSUER_URI:http://localhost:8180/realms/flexcms}
          # Optional: set jwk-set-uri directly if issuer metadata endpoint is unavailable
          # jwk-set-uri: ${FLEXCMS_JWK_SET_URI:http://localhost:8180/realms/flexcms/protocol/openid-connect/certs}

  # ----- File Upload -----
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ----- GraphQL -----
  graphql:
    graphiql:
      enabled: true
    schema:
      locations: classpath:graphql/

# ==============================================================================
# FlexCMS Custom Properties
# ==============================================================================
flexcms:
  runmode: author    # "author" or "publish"
  instance:
    id: ${random.uuid}

  # DAM / S3
  dam:
    s3:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: flexcms-assets
      region: us-east-1

  # Cache
  cache:
    redis:
      enabled: true

  # CDN providers (all disabled by default — enable in publish-tier YAML)
  cdn:
    cloudfront:
      enabled: false
      distribution-id: ${FLEXCMS_CDN_CF_DISTRIBUTION_ID:}
      region: ${FLEXCMS_CDN_CF_REGION:us-east-1}
      # Leave access-key-id blank to use IAM role credentials (recommended in ECS/EC2)
      access-key-id: ${FLEXCMS_CDN_CF_ACCESS_KEY_ID:}
      secret-access-key: ${FLEXCMS_CDN_CF_SECRET_ACCESS_KEY:}
      fallback-full-purge-on-surrogate-key: false
    cloudflare:
      enabled: false
      zone-id: ${FLEXCMS_CDN_CLOUDFLARE_ZONE_ID:}
      api-token: ${FLEXCMS_CDN_CLOUDFLARE_API_TOKEN:}
    # Hybrid routing — S3 primary, SSR fallback (enable on publish tier)
    hybrid:
      enabled: false
      s3-endpoint: ${FLEXCMS_CDN_HYBRID_S3_ENDPOINT:}     # blank = AWS S3; set "http://minio:9000" for local
      s3-bucket: ${FLEXCMS_CDN_HYBRID_S3_BUCKET:flexcms-static}
      s3-region: ${FLEXCMS_CDN_HYBRID_S3_REGION:us-east-1}
      s3-access-key: ${FLEXCMS_CDN_HYBRID_S3_ACCESS_KEY:}
      s3-secret-key: ${FLEXCMS_CDN_HYBRID_S3_SECRET_KEY:}
      s3-public-base-url: ${FLEXCMS_CDN_HYBRID_PUBLIC_BASE_URL:}  # CloudFront domain
      ssr-base-url: ${FLEXCMS_CDN_HYBRID_SSR_BASE_URL:http://localhost:8081}
      manifest-cache-seconds: 60

  # Rate limiting (token bucket per client IP — applies to public/headless APIs)
  rate-limit:
    enabled: false             # Set to true in publish-tier deployments
    capacity: 100              # Burst cap: up to 100 requests immediately
    refill-tokens: 60          # Sustained rate: 60 tokens added every...
    refill-seconds: 1          # ...1 second → 60 req/s per IP
    bucket-eviction-minutes: 10 # Purge stale IP buckets every 10 min

  # Translation connectors
  translation:
    deepl:
      enabled: false                          # Set to true to activate DeepL machine translation
      api-key: ${FLEXCMS_DEEPL_API_KEY:}      # Required when enabled
      # Free plan endpoint (keys ending in :fx); change to https://api.deepl.com/v2 for Pro
      api-url: ${FLEXCMS_DEEPL_API_URL:https://api-free.deepl.com/v2}
      max-chars-per-request: 50000

  # PIM — separate database
  pim:
    datasource:
      url: jdbc:postgresql://localhost:5432/flexcms_pim
      username: flexcms
      password: flexcms
      driver-class-name: org.postgresql.Driver

# ==============================================================================
# Server
# ==============================================================================
server:
  port: 8080

# ==============================================================================
# Actuator / Observability
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, env, loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true    # /actuator/health/liveness and /actuator/health/readiness
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      instance: ${flexcms.instance.id}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 250ms, 500ms, 1s
  observations:
    http:
      server:
        requests:
          name: http.server.requests
  # ----- Distributed Tracing -----
  tracing:
    sampling:
      probability: ${FLEXCMS_TRACE_SAMPLE_RATE:1.0}   # 1.0 = 100% in dev; lower in prod
  otlp:
    tracing:
      endpoint: ${FLEXCMS_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# ==============================================================================
# Logging
# ==============================================================================
logging:
  level:
    com.flexcms: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

