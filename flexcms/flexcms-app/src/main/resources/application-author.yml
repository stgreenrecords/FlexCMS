# Author environment profile
flexcms:
  runmode: author
  features:
    authoring-ui: true
    workflows: true
    preview: true
    replication-agent: true
    dam-upload: true
    version-management: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flexcms_author

server:
  port: 8080

# Disable distributed tracing in local dev — no OTLP collector running
management:
  tracing:
    sampling:
      probability: 0.0   # 0 = no sampling in local dev
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces   # ignored when sampling=0
