# Integration test profile — Testcontainers PostgreSQL
# DataSource URL/username/password are injected via @DynamicPropertySource

# Let Hibernate create the schema from JPA entities (no Flyway in this module's tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Disable Spring Security auto-config (not needed for repo tests)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
