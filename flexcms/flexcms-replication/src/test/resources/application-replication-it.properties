# Integration test profile for flexcms-replication
# Schema managed by Hibernate; Flyway disabled (migrations live in flexcms-app)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Suppress security auto-configuration (not needed in replication tests)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Unique publish instance id so the publish queue name is deterministic
flexcms.instance.id=test
