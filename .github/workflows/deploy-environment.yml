name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [qa, prod]
      author_count:
        description: 'Number of Author instances'
        required: false
        default: ''
      publish_count:
        description: 'Number of Publish instances'
        required: false
        default: ''
      publish_max:
        description: 'Max Publish instances (auto-scaling ceiling)'
        required: false
        default: ''
      image_tag:
        description: 'Docker image tag (default: latest successful CI build SHA)'
        required: false
        default: 'latest'

  # Auto-deploy to QA after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'qa' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-central-1' }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'qa' }}
    runs-on: ubuntu-latest

    # Only auto-deploy to QA if CI succeeded; manual dispatch always runs
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    environment:
      name: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine parameters
        id: params
        run: |
          ENV="${{ github.event.inputs.environment || 'qa' }}"
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          
          # For auto-deploy (workflow_run), use the triggering commit SHA
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TAG="sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)"
            ENV="qa"
          fi
          
          echo "env=${ENV}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          
          # Use input overrides or defaults from params file
          if [[ -n "${{ github.event.inputs.author_count }}" ]]; then
            echo "author_count=${{ github.event.inputs.author_count }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "author_count=2" >> $GITHUB_OUTPUT
          else
            echo "author_count=1" >> $GITHUB_OUTPUT
          fi
          
          if [[ -n "${{ github.event.inputs.publish_count }}" ]]; then
            echo "publish_count=${{ github.event.inputs.publish_count }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "publish_count=5" >> $GITHUB_OUTPUT
          else
            echo "publish_count=2" >> $GITHUB_OUTPUT
          fi
          
          if [[ -n "${{ github.event.inputs.publish_max }}" ]]; then
            echo "publish_max=${{ github.event.inputs.publish_max }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "publish_max=20" >> $GITHUB_OUTPUT
          else
            echo "publish_max=6" >> $GITHUB_OUTPUT
          fi

      - name: Get AWS Account ID
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Create/ensure S3 template bucket
        run: |
          BUCKET="flexcms-${{ steps.params.outputs.env }}-cfn-templates-${{ steps.aws.outputs.account_id }}"
          aws s3 mb "s3://${BUCKET}" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          echo "TEMPLATE_BUCKET=${BUCKET}" >> $GITHUB_ENV

      - name: Upload nested CloudFormation templates
        run: |
          for f in infra/cfn/*.yml; do
            [[ "$(basename "$f")" == "main.yml" ]] && continue
            echo "Uploading $(basename "$f")..."
            aws s3 cp "$f" "s3://${TEMPLATE_BUCKET}/$(basename "$f")"
          done

      - name: Deploy CloudFormation stack
        run: |
          ENV="${{ steps.params.outputs.env }}"
          STACK_NAME="flexcms-${ENV}"
          TEMPLATE_URL="https://${TEMPLATE_BUCKET}.s3.${{ env.AWS_REGION }}.amazonaws.com"
          
          # Read base params from file
          DB_CLASS=$(jq -r '.[] | select(.ParameterKey=="DBInstanceClass") | .ParameterValue' infra/cfn/params/${ENV}.json)
          DB_STORAGE=$(jq -r '.[] | select(.ParameterKey=="DBAllocatedStorage") | .ParameterValue' infra/cfn/params/${ENV}.json)
          CACHE_TYPE=$(jq -r '.[] | select(.ParameterKey=="CacheNodeType") | .ParameterValue' infra/cfn/params/${ENV}.json)
          BROKER_TYPE=$(jq -r '.[] | select(.ParameterKey=="BrokerInstanceType") | .ParameterValue' infra/cfn/params/${ENV}.json)
          
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file infra/cfn/main.yml \
            --parameter-overrides \
              "EnvironmentName=${ENV}" \
              "DockerImageTag=${{ steps.params.outputs.tag }}" \
              "DBMasterPassword=${{ secrets.FLEXCMS_DB_PASSWORD }}" \
              "BrokerPassword=${{ secrets.FLEXCMS_MQ_PASSWORD }}" \
              "TemplateBucketUrl=${TEMPLATE_URL}" \
              "DBInstanceClass=${DB_CLASS}" \
              "DBAllocatedStorage=${DB_STORAGE}" \
              "CacheNodeType=${CACHE_TYPE}" \
              "BrokerInstanceType=${BROKER_TYPE}" \
              "AuthorDesiredCount=${{ steps.params.outputs.author_count }}" \
              "PublishDesiredCount=${{ steps.params.outputs.publish_count }}" \
              "PublishMaxCount=${{ steps.params.outputs.publish_max }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Force new ECS deployment (rolling update)
        run: |
          ENV="${{ steps.params.outputs.env }}"
          CLUSTER="flexcms-${ENV}"
          
          echo ">>> Forcing new deployment for author service..."
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "flexcms-${ENV}-author" \
            --force-new-deployment \
            --no-cli-pager || true
          
          echo ">>> Forcing new deployment for publish service..."
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "flexcms-${ENV}-publish" \
            --force-new-deployment \
            --no-cli-pager || true

      - name: Show stack outputs
        run: |
          ENV="${{ steps.params.outputs.env }}"
          echo "=== FlexCMS ${ENV} Stack Outputs ==="
          aws cloudformation describe-stacks \
            --stack-name "flexcms-${ENV}" \
            --query "Stacks[0].Outputs[*].[OutputKey,OutputValue]" \
            --output table

