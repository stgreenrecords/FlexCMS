name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend — Maven multi-module build + test
  # ===========================================================================
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flexcms
          POSTGRES_USER: flexcms
          POSTGRES_PASSWORD: flexcms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flexcms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmqctl status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test (Maven)
        working-directory: flexcms
        run: mvn clean verify -B --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/flexcms
          SPRING_DATASOURCE_USERNAME: flexcms
          SPRING_DATASOURCE_PASSWORD: flexcms
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: guest
          SPRING_RABBITMQ_PASSWORD: guest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: flexcms/**/target/surefire-reports/*.xml
          retention-days: 7

  # ===========================================================================
  # Frontend — pnpm + Turborepo build
  # ===========================================================================
  frontend:
    name: Frontend (Node 20 / pnpm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: frontend
        # Use --frozen-lockfile once pnpm-lock.yaml is committed; remove flag if no lockfile
        run: pnpm install

      - name: Build all packages
        working-directory: frontend
        run: pnpm build

      - name: Run tests
        working-directory: frontend
        # --if-present: only runs if a "test" script is defined in package.json
        run: pnpm test --if-present || pnpm --recursive --if-present run test

      - name: Type check
        working-directory: frontend
        run: pnpm --recursive --if-present run lint

  # ===========================================================================
  # Docker image build + push to GHCR
  #   • PRs:        build only (verify Dockerfile, no push)
  #   • main push:  build + push ghcr.io/<owner>/flexcms-app:latest + :<sha>
  # ===========================================================================
  docker:
    name: Docker image build + push
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (for Maven package)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package backend (skip tests — already passed in backend job)
        working-directory: flexcms
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flexcms-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: flexcms
          file: flexcms/Dockerfile
          # Only push when merging to main; PRs build only (smoke-test the Dockerfile)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
