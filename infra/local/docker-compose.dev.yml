# =============================================================================
# FlexCMS — Full Local Development Stack
# =============================================================================
# All three pillars (Content/CMS, DAM, PIM) run inside each FlexCMS instance.
# Author instance = read-write (authoring + DAM upload + PIM editing)
# Publish instance = read-only (headless delivery, receives replication)
#
# Quick start:
#   cd infra/local
#   cp .env.local .env
#   docker compose up -d                     # infrastructure only
#   docker compose --profile app up -d       # infrastructure + backend apps
#   docker compose --profile full up -d      # everything including admin UI
#
# Developer workflow (recommended — fastest iteration):
#   docker compose up -d                     # start infra only
#   cd ../../flexcms && mvn spring-boot:run -Dspring-boot.run.profiles=author   # backend from IDE
#   cd ../../frontend/apps/admin && pnpm dev                                     # frontend from IDE
#
# Full-stack Docker (CI-like, slower iteration):
#   docker compose --profile full up -d --build
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │                       Service Map                                  │
# ├─────────────────────────────────────────────────────────────────────┤
# │  Infrastructure (always up):                                       │
# │    PostgreSQL 16 ......... localhost:5432  (flexcms/flexcms)       │
# │    Redis 7 ............... localhost:6379                          │
# │    RabbitMQ 3 ............ localhost:5672  (mgmt: 15672)          │
# │    MinIO (S3) ............ localhost:9000  (console: 9001)        │
# │    Elasticsearch 8 ...... localhost:9200                          │
# │    pgAdmin 4 ............. localhost:5050  (DB browser UI)        │
# │                                                                    │
# │  Backend (--profile app):                                          │
# │    CMS Author ........... localhost:8080  (Content+DAM+PIM R/W)   │
# │    CMS Publish .......... localhost:8081  (Content+DAM read-only) │
# │                                                                    │
# │  Frontend (--profile full):                                        │
# │    Admin UI (Next.js) ... localhost:3000                          │
# │                                                                    │
# │  Databases:                                                        │
# │    flexcms_author ........ CMS author content tree + DAM assets   │
# │    flexcms_publish ....... CMS publish (replicated read-only)     │
# │    flexcms_pim ........... PIM products, catalogs, schemas        │
# └─────────────────────────────────────────────────────────────────────┘
# =============================================================================

services:
  # ===========================================================================
  # Infrastructure Services (no profile = always start)
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: flexcms-postgres
    environment:
      POSTGRES_DB: flexcms
      POSTGRES_USER: ${POSTGRES_USER:-flexcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flexcms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../flexcms/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexcms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flexcms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flexcms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: flexcms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/flexcms-assets;
      mc mb --ignore-existing local/flexcms-static;
      echo 'MinIO buckets created';
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: flexcms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # pgAdmin 4 — PostgreSQL Web UI
  # ===========================================================================
  # Browse all three FlexCMS databases from a single web interface.
  # Open: http://localhost:5050
  # Login is DISABLED (desktop mode) — opens straight to the database browser.
  # All three databases are pre-registered (servers.json):
  #   • FlexCMS Author DB   → flexcms_author
  #   • FlexCMS Publish DB  → flexcms_publish
  #   • FlexCMS PIM DB      → flexcms_pim
  # Password to connect to each server: flexcms
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flexcms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flexcms.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      # Desktop mode: skip the pgAdmin login screen entirely
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Pre-register all three FlexCMS databases automatically
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # FlexCMS Author (Content + DAM + PIM — read-write)
  # ===========================================================================
  # This single JAR serves all three pillars:
  #   /api/author/**   → Content authoring (create/edit/delete pages)
  #   /api/dam/**      → DAM operations (upload/process/manage assets)
  #   /api/pim/**      → PIM operations (product CRUD, catalog, import)
  #   /api/content/**  → Headless preview (author-mode content read)
  #   /graphql         → GraphQL endpoint
  # ===========================================================================
  author:
    profiles: [app, full]
    image: ghcr.io/stgreenrecords/flexcms-app:latest
    build:
      context: ../../flexcms
      dockerfile: Dockerfile
    container_name: flexcms-author
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: author
      # --- CMS Database (author) ---
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_author
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-flexcms}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-flexcms}
      # --- PIM Database (separate, shared between author/publish) ---
      FLEXCMS_PIM_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_pim
      FLEXCMS_PIM_DATASOURCE_USERNAME: ${POSTGRES_USER:-flexcms}
      FLEXCMS_PIM_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-flexcms}
      # --- Redis ---
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # --- RabbitMQ (replication agent — sends events) ---
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      # --- Elasticsearch ---
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # --- DAM / S3 (MinIO) ---
      FLEXCMS_DAM_S3_ENDPOINT: http://minio:9000
      FLEXCMS_DAM_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      FLEXCMS_DAM_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLEXCMS_DAM_S3_BUCKET: flexcms-assets
      FLEXCMS_DAM_S3_REGION: us-east-1
      # --- Security ---
      FLEXCMS_JWT_ISSUER_URI: ${FLEXCMS_JWT_ISSUER_URI:-http://localhost:8180/realms/flexcms}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===========================================================================
  # FlexCMS Publish (Content + DAM read-only — receives replication)
  # ===========================================================================
  # Read-only delivery tier. Receives content from Author via RabbitMQ.
  #   /api/content/**  → Headless content delivery (REST)
  #   /graphql         → GraphQL endpoint
  #   /dam/renditions  → DAM asset renditions (CDN-friendly)
  # PIM data is also accessible for product pages (read-only from flexcms_pim DB).
  # ===========================================================================
  publish:
    profiles: [app, full]
    image: ghcr.io/stgreenrecords/flexcms-app:latest
    build:
      context: ../../flexcms
      dockerfile: Dockerfile
    container_name: flexcms-publish
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: publish
      # --- CMS Database (publish — replicated content) ---
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_publish
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-flexcms}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-flexcms}
      # --- PIM Database (shared read-only) ---
      FLEXCMS_PIM_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_pim
      FLEXCMS_PIM_DATASOURCE_USERNAME: ${POSTGRES_USER:-flexcms}
      FLEXCMS_PIM_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-flexcms}
      # --- Redis (caching) ---
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # --- RabbitMQ (replication receiver — consumes events) ---
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      # --- Elasticsearch ---
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # --- DAM / S3 (MinIO) ---
      FLEXCMS_DAM_S3_ENDPOINT: http://minio:9000
      FLEXCMS_DAM_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      FLEXCMS_DAM_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLEXCMS_DAM_S3_BUCKET: flexcms-assets
      FLEXCMS_DAM_S3_REGION: us-east-1
      # --- Security ---
      FLEXCMS_JWT_ISSUER_URI: ${FLEXCMS_JWT_ISSUER_URI:-http://localhost:8180/realms/flexcms}
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      author:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===========================================================================
  # Hybrid CDN Proxy (--profile cdn)
  # ===========================================================================
  # Simulates CloudFront Origin Group for local development:
  #   - Primary:  MinIO S3 (pre-built HTML from build-worker)
  #   - Fallback: CMS Publish (SSR, renders pages dynamically on cache miss)
  #
  # Access: http://localhost:8082/{pagePath}
  #
  # Usage:
  #   SITE_ID=corporate LOCALE=en docker compose --profile cdn up -d hybrid-cdn
  # ===========================================================================
  hybrid-cdn:
    profiles: [cdn]
    image: nginx:1.27-alpine
    container_name: flexcms-hybrid-cdn
    ports:
      - "8082:80"
    environment:
      SITE_ID: ${HYBRID_CDN_SITE_ID:-corporate}
      LOCALE: ${HYBRID_CDN_LOCALE:-en}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      minio:
        condition: service_started
      publish:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Admin UI — Next.js (Content + DAM + PIM admin interface)
  # ===========================================================================
  admin-ui:
    profiles: [full]
    build:
      context: ../../frontend
      dockerfile: apps/admin/Dockerfile
    container_name: flexcms-admin-ui
    ports:
      - "3000:3000"
    environment:
      FLEXCMS_API_URL: http://author:8080
      NEXT_PUBLIC_FLEXCMS_API_URL: http://localhost:8080
    depends_on:
      author:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  es_data:
  pgadmin_data:

