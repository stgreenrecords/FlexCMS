AWSTemplateFormatVersion: '2010-09-09'
Description: FlexCMS Root orchestrator - deploys all nested stacks.
Parameters:
  EnvironmentName:
    Type: String
    AllowedValues: [qa, prod]
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
  DBInstanceClass:
    Type: String
    Default: db.t3.medium
  DBAllocatedStorage:
    Type: Number
    Default: 50
  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  CacheNodeType:
    Type: String
    Default: cache.t3.micro
  BrokerInstanceType:
    Type: String
    Default: mq.m5.large
  BrokerPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  DockerImageTag:
    Type: String
    Default: latest
  AuthorDesiredCount:
    Type: Number
    Default: 1
  PublishDesiredCount:
    Type: Number
    Default: 2
  PublishMaxCount:
    Type: Number
    Default: 10
  TemplateBucketUrl:
    Type: String
    Description: S3 URL prefix for nested CFN templates
  # Frontend image URIs (ECR). Leave empty to skip deploying that service.
  AdminImageUri:
    Type: String
    Default: ''
    Description: ECR image URI for the Admin UI (Next.js). Empty = skip Admin service.
  SiteImageUri:
    Type: String
    Default: ''
    Description: ECR image URI for the Site-nextjs. Empty = skip Site service.
  AdminDesiredCount:
    Type: Number
    Default: 1
  SiteDesiredCount:
    Type: Number
    Default: 1
  # Domain / TLS (all optional — leave empty for HTTP-only deployment)
  DomainName:
    Type: String
    Default: ''
    Description: Base domain e.g. qa.flexcmsdemo.store. Empty = no custom domain.
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (eu-central-1) for ALBs. Empty = HTTP only.
  CloudFrontCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (us-east-1) for CloudFront. Empty = no custom domain on CF.

Conditions:
  IsProd: !Equals [!Ref EnvironmentName, prod]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  HasCloudFrontCert: !Not [!Equals [!Ref CloudFrontCertificateArn, '']]
  HasDomain: !Not [!Equals [!Ref DomainName, '']]
  HasAdminImage: !Not [!Equals [!Ref AdminImageUri, '']]
  HasSiteImage: !Not [!Equals [!Ref SiteImageUri, '']]

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketUrl}/network.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VpcCidr: !Ref VpcCidr

  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketUrl}/storage.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketUrl}/database.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        DBInstanceClass: !Ref DBInstanceClass
        DBAllocatedStorage: !Ref DBAllocatedStorage
        DBMasterPassword: !Ref DBMasterPassword
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        DatabaseSecurityGroup: !GetAtt NetworkStack.Outputs.DatabaseSecurityGroup

  CacheStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketUrl}/cache.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        CacheNodeType: !Ref CacheNodeType
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        CacheSecurityGroup: !GetAtt NetworkStack.Outputs.CacheSecurityGroup

  MessagingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketUrl}/messaging.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        BrokerInstanceType: !Ref BrokerInstanceType
        BrokerPassword: !Ref BrokerPassword
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        MessagingSecurityGroup: !GetAtt NetworkStack.Outputs.MessagingSecurityGroup

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub flexcms-${EnvironmentName}
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  AuthorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/flexcms-${EnvironmentName}-author
      RetentionInDays: !If [IsProd, 90, 30]

  PublishLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/flexcms-${EnvironmentName}-publish
      RetentionInDays: !If [IsProd, 90, 30]

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub flexcms-${EnvironmentName}-ecs-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub flexcms-${EnvironmentName}-ecs-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt StorageStack.Outputs.AssetsBucketArn
                  - !Sub ${StorageStack.Outputs.AssetsBucketArn}/*
                  - !GetAtt StorageStack.Outputs.StaticSiteBucketArn
                  - !Sub ${StorageStack.Outputs.StaticSiteBucketArn}/*

  PublishALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub fcms-${EnvironmentName}-pub
      Scheme: internet-facing
      Type: application
      Subnets:
        - !GetAtt NetworkStack.Outputs.PublicSubnetA
        - !GetAtt NetworkStack.Outputs.PublicSubnetB
      SecurityGroups:
        - !GetAtt NetworkStack.Outputs.AlbSecurityGroup

  PublishTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub fcms-${EnvironmentName}-pub-tg
      Port: 8081
      Protocol: HTTP
      VpcId: !GetAtt NetworkStack.Outputs.VpcId
      TargetType: ip
      HealthCheckPath: /actuator/health/readiness
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  PublishListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublishALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PublishTargetGroup

  AuthorALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub fcms-${EnvironmentName}-auth
      # QA: internet-facing so Admin UI browser calls can reach the Author API.
      # Prod: internal — Admin UI runs in VPC and connects via private DNS.
      Scheme: !If [IsProd, internal, internet-facing]
      Type: application
      Subnets:
        - !If [IsProd, !GetAtt NetworkStack.Outputs.PrivateSubnetA, !GetAtt NetworkStack.Outputs.PublicSubnetA]
        - !If [IsProd, !GetAtt NetworkStack.Outputs.PrivateSubnetB, !GetAtt NetworkStack.Outputs.PublicSubnetB]
      SecurityGroups:
        - !GetAtt NetworkStack.Outputs.AlbSecurityGroup

  AuthorTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub fcms-${EnvironmentName}-auth-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !GetAtt NetworkStack.Outputs.VpcId
      TargetType: ip
      HealthCheckPath: /actuator/health/readiness
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '3600'

  AuthorListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AuthorALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AuthorTargetGroup

  AuthorTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub flexcms-${EnvironmentName}-author
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !If [IsProd, '2048', '1024']
      Memory: !If [IsProd, '4096', '2048']
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: flexcms-author
          Image: !Sub ghcr.io/stgreenrecords/flexcms-app:${DockerImageTag}
          Essential: true
          PortMappings: [{ContainerPort: 8080}]
          Environment:
            - {Name: SPRING_PROFILES_ACTIVE, Value: author}
            - {Name: SERVER_PORT, Value: '8080'}
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub
                - jdbc:postgresql://${EP}:5432/flexcms_author
                - EP: !GetAtt DatabaseStack.Outputs.DBEndpoint
            - {Name: SPRING_DATASOURCE_USERNAME, Value: flexcms}
            - {Name: SPRING_DATASOURCE_PASSWORD, Value: !Ref DBMasterPassword}
            - {Name: SPRING_DATA_REDIS_HOST, Value: !GetAtt CacheStack.Outputs.RedisEndpoint}
            - {Name: SPRING_DATA_REDIS_PORT, Value: '6379'}
            - {Name: SPRING_RABBITMQ_HOST, Value: !GetAtt MessagingStack.Outputs.BrokerHostname}
            - {Name: SPRING_RABBITMQ_PORT, Value: '5671'}
            - {Name: SPRING_RABBITMQ_USERNAME, Value: flexcms}
            - {Name: SPRING_RABBITMQ_PASSWORD, Value: !Ref BrokerPassword}
            - {Name: SPRING_RABBITMQ_SSL_ENABLED, Value: 'true'}
            - Name: SPRING_ELASTICSEARCH_URIS
              Value: !Sub http://elasticsearch.flexcms-${EnvironmentName}.local:9200
            - {Name: FLEXCMS_DAM_S3_BUCKET, Value: !GetAtt StorageStack.Outputs.AssetsBucketName}
            - {Name: FLEXCMS_DAM_S3_REGION, Value: !Ref 'AWS::Region'}
            # PIM database (separate DB on same RDS instance)
            - Name: FLEXCMS_PIM_DATASOURCE_URL
              Value: !Sub
                - jdbc:postgresql://${EP}:5432/flexcms_pim
                - EP: !GetAtt DatabaseStack.Outputs.DBEndpoint
            - {Name: FLEXCMS_PIM_DATASOURCE_USERNAME, Value: flexcms}
            - {Name: FLEXCMS_PIM_DATASOURCE_PASSWORD, Value: !Ref DBMasterPassword}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AuthorLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: author

  AuthorService:
    Type: AWS::ECS::Service
    DependsOn: AuthorListener
    Properties:
      ServiceName: !Sub flexcms-${EnvironmentName}-author
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref AuthorTaskDef
      DesiredCount: !Ref AuthorDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !GetAtt NetworkStack.Outputs.PrivateSubnetA
            - !GetAtt NetworkStack.Outputs.PrivateSubnetB
          SecurityGroups:
            - !GetAtt NetworkStack.Outputs.EcsSecurityGroup
      LoadBalancers:
        - ContainerName: flexcms-author
          ContainerPort: 8080
          TargetGroupArn: !Ref AuthorTargetGroup

  PublishTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub flexcms-${EnvironmentName}-publish
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !If [IsProd, '2048', '1024']
      Memory: !If [IsProd, '4096', '2048']
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: flexcms-publish
          Image: !Sub ghcr.io/stgreenrecords/flexcms-app:${DockerImageTag}
          Essential: true
          PortMappings: [{ContainerPort: 8081}]
          Environment:
            - {Name: SPRING_PROFILES_ACTIVE, Value: publish}
            - {Name: SERVER_PORT, Value: '8081'}
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub
                - jdbc:postgresql://${EP}:5432/flexcms_publish
                - EP: !GetAtt DatabaseStack.Outputs.DBEndpoint
            - {Name: SPRING_DATASOURCE_USERNAME, Value: flexcms}
            - {Name: SPRING_DATASOURCE_PASSWORD, Value: !Ref DBMasterPassword}
            - {Name: SPRING_DATA_REDIS_HOST, Value: !GetAtt CacheStack.Outputs.RedisEndpoint}
            - {Name: SPRING_DATA_REDIS_PORT, Value: '6379'}
            - {Name: SPRING_RABBITMQ_HOST, Value: !GetAtt MessagingStack.Outputs.BrokerHostname}
            - {Name: SPRING_RABBITMQ_PORT, Value: '5671'}
            - {Name: SPRING_RABBITMQ_USERNAME, Value: flexcms}
            - {Name: SPRING_RABBITMQ_PASSWORD, Value: !Ref BrokerPassword}
            - {Name: SPRING_RABBITMQ_SSL_ENABLED, Value: 'true'}
            - Name: SPRING_ELASTICSEARCH_URIS
              Value: !Sub http://elasticsearch.flexcms-${EnvironmentName}.local:9200
            - {Name: FLEXCMS_DAM_S3_BUCKET, Value: !GetAtt StorageStack.Outputs.AssetsBucketName}
            - {Name: FLEXCMS_DAM_S3_REGION, Value: !Ref 'AWS::Region'}
            # PIM database (separate DB on same RDS instance, read-only for publish)
            - Name: FLEXCMS_PIM_DATASOURCE_URL
              Value: !Sub
                - jdbc:postgresql://${EP}:5432/flexcms_pim
                - EP: !GetAtt DatabaseStack.Outputs.DBEndpoint
            - {Name: FLEXCMS_PIM_DATASOURCE_USERNAME, Value: flexcms}
            - {Name: FLEXCMS_PIM_DATASOURCE_PASSWORD, Value: !Ref DBMasterPassword}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref PublishLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: publish

  PublishService:
    Type: AWS::ECS::Service
    DependsOn: PublishListener
    Properties:
      ServiceName: !Sub flexcms-${EnvironmentName}-publish
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref PublishTaskDef
      DesiredCount: !Ref PublishDesiredCount
      CapacityProviderStrategy:
        - {CapacityProvider: FARGATE, Weight: 1, Base: 1}
        - {CapacityProvider: FARGATE_SPOT, Weight: 3}
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !GetAtt NetworkStack.Outputs.PrivateSubnetA
            - !GetAtt NetworkStack.Outputs.PrivateSubnetB
          SecurityGroups:
            - !GetAtt NetworkStack.Outputs.EcsSecurityGroup
      LoadBalancers:
        - ContainerName: flexcms-publish
          ContainerPort: 8081
          TargetGroupArn: !Ref PublishTargetGroup

  PublishScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref PublishMaxCount
      MinCapacity: !Ref PublishDesiredCount
      ResourceId: !Sub service/${EcsCluster}/${PublishService.Name}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PublishCpuScaling:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub flexcms-${EnvironmentName}-publish-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PublishScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  PublishRequestScaling:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub flexcms-${EnvironmentName}-publish-requests
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PublishScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub
            - ${ALB}/${TG}
            - ALB: !GetAtt PublishALB.LoadBalancerFullName
              TG: !GetAtt PublishTargetGroup.TargetGroupFullName
        TargetValue: 1000.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ===========================================================================
  # HTTPS Listeners — Author ALB + Publish ALB (requires CertificateArn param)
  # ===========================================================================

  AuthorHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref AuthorALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AuthorTargetGroup

  PublishHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref PublishALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PublishTargetGroup

  # ===========================================================================
  # Service Discovery — Cloud Map private DNS namespace for ECS-to-ECS routing
  # ===========================================================================

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub flexcms-${EnvironmentName}.local
      Vpc: !GetAtt NetworkStack.Outputs.VpcId

  ElasticsearchDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: elasticsearch
      NamespaceId: !GetAtt ServiceDiscoveryNamespace.Id
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Elasticsearch — ephemeral single-node (QA). Prod: use Amazon OpenSearch.
  # Spring connects via http://elasticsearch.flexcms-<env>.local:9200
  # ===========================================================================

  ElasticsearchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/flexcms-${EnvironmentName}-elasticsearch
      RetentionInDays: 7

  ElasticsearchTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub flexcms-${EnvironmentName}-elasticsearch
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '1024'
      Memory: '2048'
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: elasticsearch
          Image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          Essential: true
          PortMappings: [{ContainerPort: 9200}]
          Environment:
            - {Name: discovery.type, Value: single-node}
            - {Name: ES_JAVA_OPTS, Value: '-Xms512m -Xmx512m'}
            - {Name: xpack.security.enabled, Value: 'false'}
            - {Name: xpack.security.http.ssl.enabled, Value: 'false'}
            - Name: cluster.name
              Value: !Sub flexcms-${EnvironmentName}
          Ulimits:
            - Name: nofile
              SoftLimit: 65536
              HardLimit: 65536
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ElasticsearchLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: elasticsearch

  ElasticsearchService:
    Type: AWS::ECS::Service
    DependsOn: ServiceDiscoveryNamespace
    Properties:
      ServiceName: !Sub flexcms-${EnvironmentName}-elasticsearch
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref ElasticsearchTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !GetAtt NetworkStack.Outputs.PrivateSubnetA
          SecurityGroups:
            - !GetAtt NetworkStack.Outputs.EcsSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt ElasticsearchDiscoveryService.Arn

  # ===========================================================================
  # Admin UI — Next.js, internet-facing ALB, private ECS subnet
  # ===========================================================================

  AdminLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/flexcms-${EnvironmentName}-admin
      RetentionInDays: !If [IsProd, 90, 14]

  AdminALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub fcms-${EnvironmentName}-admin
      Scheme: internet-facing
      Type: application
      Subnets:
        - !GetAtt NetworkStack.Outputs.PublicSubnetA
        - !GetAtt NetworkStack.Outputs.PublicSubnetB
      SecurityGroups:
        - !GetAtt NetworkStack.Outputs.AlbSecurityGroup

  AdminTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub fcms-${EnvironmentName}-admin-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !GetAtt NetworkStack.Outputs.VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AdminListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AdminALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AdminTargetGroup

  AdminHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref AdminALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AdminTargetGroup

  AdminTaskDef:
    Type: AWS::ECS::TaskDefinition
    Condition: HasAdminImage
    Properties:
      Family: !Sub flexcms-${EnvironmentName}-admin
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: flexcms-admin
          Image: !Ref AdminImageUri
          Essential: true
          PortMappings: [{ContainerPort: 3000}]
          Environment:
            # NEXT_PUBLIC_FLEXCMS_API is baked into the Next.js bundle at image build time.
            # This env var is passed as a runtime hint and for documentation purposes.
            - Name: NEXT_PUBLIC_FLEXCMS_API
              Value: !If
                - HasDomain
                - !Sub https://api.${DomainName}
                - !Sub http://${AuthorALB.DNSName}
            - Name: NEXT_PUBLIC_FLEXCMS_SITE_URL
              Value: !If
                - HasDomain
                - !Sub https://site.${DomainName}
                - !Sub http://${SiteALB.DNSName}
            - {Name: NODE_ENV, Value: production}
            - {Name: NEXT_TELEMETRY_DISABLED, Value: '1'}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AdminLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: admin

  AdminService:
    Type: AWS::ECS::Service
    Condition: HasAdminImage
    DependsOn: AdminListener
    Properties:
      ServiceName: !Sub flexcms-${EnvironmentName}-admin
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref AdminTaskDef
      DesiredCount: !Ref AdminDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !GetAtt NetworkStack.Outputs.PrivateSubnetA
            - !GetAtt NetworkStack.Outputs.PrivateSubnetB
          SecurityGroups:
            - !GetAtt NetworkStack.Outputs.EcsSecurityGroup
      LoadBalancers:
        - ContainerName: flexcms-admin
          ContainerPort: 3000
          TargetGroupArn: !Ref AdminTargetGroup

  # ===========================================================================
  # Site-nextjs — Next.js SSR reference site, internet-facing ALB
  # ===========================================================================

  SiteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/flexcms-${EnvironmentName}-site
      RetentionInDays: !If [IsProd, 90, 14]

  SiteALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub fcms-${EnvironmentName}-site
      Scheme: internet-facing
      Type: application
      Subnets:
        - !GetAtt NetworkStack.Outputs.PublicSubnetA
        - !GetAtt NetworkStack.Outputs.PublicSubnetB
      SecurityGroups:
        - !GetAtt NetworkStack.Outputs.AlbSecurityGroup

  SiteTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub fcms-${EnvironmentName}-site-tg
      Port: 3001
      Protocol: HTTP
      VpcId: !GetAtt NetworkStack.Outputs.VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  SiteListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref SiteALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref SiteTargetGroup

  SiteHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref SiteALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref SiteTargetGroup

  SiteTaskDef:
    Type: AWS::ECS::TaskDefinition
    Condition: HasSiteImage
    Properties:
      Family: !Sub flexcms-${EnvironmentName}-site
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: flexcms-site
          Image: !Ref SiteImageUri
          Essential: true
          PortMappings: [{ContainerPort: 3001}]
          Environment:
            # Server-side only — can be set at runtime for standalone Next.js
            - Name: FLEXCMS_API_URL
              Value: !Sub http://${AuthorALB.DNSName}
            - {Name: FLEXCMS_DEFAULT_SITE, Value: corporate}
            - {Name: FLEXCMS_DEFAULT_LOCALE, Value: en}
            - {Name: PORT, Value: '3001'}
            - {Name: NODE_ENV, Value: production}
            - {Name: NEXT_TELEMETRY_DISABLED, Value: '1'}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref SiteLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: site

  SiteService:
    Type: AWS::ECS::Service
    Condition: HasSiteImage
    DependsOn: SiteListener
    Properties:
      ServiceName: !Sub flexcms-${EnvironmentName}-site
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref SiteTaskDef
      DesiredCount: !Ref SiteDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !GetAtt NetworkStack.Outputs.PrivateSubnetA
            - !GetAtt NetworkStack.Outputs.PrivateSubnetB
          SecurityGroups:
            - !GetAtt NetworkStack.Outputs.EcsSecurityGroup
      LoadBalancers:
        - ContainerName: flexcms-site
          ContainerPort: 3001
          TargetGroupArn: !Ref SiteTargetGroup

  # ===========================================================================
  # CDN Hybrid Routing — CloudFront Distribution
  # ===========================================================================
  # Origin Group:
  #   Primary origin  : S3 static site bucket (pre-built HTML from build-worker)
  #   Fallback origin : Publish ALB (SSR — renders pages dynamically on 403/404)
  #
  # CloudFront automatically retries the SSR origin when S3 returns a 403 or 404.
  # This mirrors the local-dev nginx proxy defined in infra/local/nginx/.
  # ===========================================================================

  # Origin Access Control — allows CloudFront to read from the private S3 bucket
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub flexcms-${EnvironmentName}-static-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket policy — grants CloudFront OAC read access to the static site bucket
  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !GetAtt StorageStack.Outputs.StaticSiteBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - arn:aws:s3:::${Bucket}/*
              - Bucket: !GetAtt StorageStack.Outputs.StaticSiteBucketName
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}
                  - DistId: !Ref FlexCMSDistribution

  # CloudFront Distribution with hybrid routing Origin Group
  FlexCMSDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub FlexCMS ${EnvironmentName} — hybrid routing (S3 primary / SSR fallback)
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !If [IsProd, PriceClass_All, PriceClass_100]
        Aliases: !If
          - HasCloudFrontCert
          - [!Ref DomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCloudFrontCert
          - AcmCertificateArn: !Ref CloudFrontCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

        Origins:
          # Primary: S3 static site bucket (pre-built HTML)
          - Id: S3StaticOrigin
            DomainName: !Sub
              - ${Bucket}.s3.${AWS::Region}.amazonaws.com
              - Bucket: !GetAtt StorageStack.Outputs.StaticSiteBucketName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''  # empty = use OAC (not legacy OAI)

          # Fallback: Publish ALB (SSR — renders dynamically on cache miss)
          - Id: SSRPublishOrigin
            DomainName: !GetAtt PublishALB.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5

        # Origin Group — CloudFront retries SSR when S3 returns 403/404
        OriginGroups:
          Items:
            - Id: HybridOriginGroup
              FailoverCriteria:
                StatusCodes:
                  Items: [403, 404]
                  Quantity: 2
              Members:
                Items:
                  - OriginId: S3StaticOrigin
                  - OriginId: SSRPublishOrigin
                Quantity: 2
          Quantity: 1

        DefaultCacheBehavior:
          TargetOriginId: HybridOriginGroup
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (managed)
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader

        # Cache behaviour for the S3 manifest — short TTL so routing decisions stay fresh
        CacheBehaviors:
          - PathPattern: _meta/*
            TargetOriginId: S3StaticOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: false
            DefaultTTL: 60
            MaxTTL: 60
            MinTTL: 0
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled (managed)

        CustomErrorResponses:
          # On SSR 404 — return SSR response as-is (not a CloudFront error page)
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404
            ErrorCachingMinTTL: 0

Outputs:
  PublishALBDns:
    Value: !GetAtt PublishALB.DNSName
  AuthorALBDns:
    Value: !GetAtt AuthorALB.DNSName
  AdminALBDns:
    Value: !GetAtt AdminALB.DNSName
  SiteALBDns:
    Value: !GetAtt SiteALB.DNSName
  ClusterName:
    Value: !Ref EcsCluster
  RDSEndpoint:
    Value: !GetAtt DatabaseStack.Outputs.DBEndpoint
  RedisEndpoint:
    Value: !GetAtt CacheStack.Outputs.RedisEndpoint
  BrokerEndpoint:
    Value: !GetAtt MessagingStack.Outputs.BrokerEndpoint
  ElasticsearchEndpoint:
    Value: !Sub http://elasticsearch.flexcms-${EnvironmentName}.local:9200
  CloudFrontDistributionId:
    Value: !Ref FlexCMSDistribution
  CloudFrontDomain:
    Value: !GetAtt FlexCMSDistribution.DomainName

