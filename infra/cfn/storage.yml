AWSTemplateFormatVersion: '2010-09-09'
Description: FlexCMS — S3 buckets for DAM assets and static site output.

Parameters:
  EnvironmentName:
    Type: String
    AllowedValues: [qa, prod]

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub flexcms-${EnvironmentName}-assets-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: CleanOldVersions
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
            Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  StaticSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub flexcms-${EnvironmentName}-static-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # NOTE: The CFN templates bucket (flexcms-<env>-cfn-templates-<accountId>) is a
  # BOOTSTRAP resource — deploy.sh creates it with `aws s3 mb` before this stack runs
  # and uploads nested templates into it. Do NOT manage it here: if it were defined as a
  # CFN resource with DeletionPolicy:Retain, every redeploy after a rollback would fail
  # with "bucket already exists" because CFN tries to CREATE it again.

Outputs:
  AssetsBucketName:
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub ${AWS::StackName}-AssetsBucket
  AssetsBucketArn:
    Value: !GetAtt AssetsBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-AssetsBucketArn
  StaticSiteBucketName:
    Value: !Ref StaticSiteBucket
    Export:
      Name: !Sub ${AWS::StackName}-StaticBucket
  StaticSiteBucketArn:
    Value: !GetAtt StaticSiteBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-StaticBucketArn

