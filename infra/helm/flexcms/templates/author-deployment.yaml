{{- if .Values.author.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flexcms.fullname" . }}-author
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flexcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: author
spec:
  replicas: {{ .Values.author.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "flexcms.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: author
  strategy:
    {{- toYaml .Values.author.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "flexcms.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: author
      {{- with .Values.author.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flexcms.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: author
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.author.containerPort }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "author"
            # ── Database (Author DB) ──────────────────────────────────────────
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRESQL_HOST):$(POSTGRESQL_PORT)/$(POSTGRESQL_AUTHOR_DB)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "flexcms.fullname" . }}-config
                  key: POSTGRESQL_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                {{- include "flexcms.postgresql.password" . | nindent 16 }}
            # PIM has its own datasource pointing to the same host
            - name: FLEXCMS_PIM_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRESQL_HOST):$(POSTGRESQL_PORT)/$(POSTGRESQL_PIM_DB)"
            - name: FLEXCMS_PIM_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "flexcms.fullname" . }}-config
                  key: POSTGRESQL_USERNAME
            - name: FLEXCMS_PIM_DATASOURCE_PASSWORD
              valueFrom:
                {{- include "flexcms.postgresql.password" . | nindent 16 }}
            # ── Shared infra env vars ─────────────────────────────────────────
            {{- include "flexcms.backendEnv" . | nindent 12 }}
            # ── Extra env vars ────────────────────────────────────────────────
            {{- with .Values.author.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "flexcms.fullname" . }}-config
          # ── Probes ───────────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ .Values.author.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.author.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.author.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: {{ .Values.author.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.author.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.author.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ .Values.author.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.author.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.author.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.author.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.author.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.author.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.author.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

