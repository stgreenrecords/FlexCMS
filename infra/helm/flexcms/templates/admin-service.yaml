{{- if .Values.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flexcms.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flexcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - port: {{ .Values.admin.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "flexcms.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin
{{- end }}

{{- if and .Values.admin.enabled .Values.admin.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "flexcms.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flexcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "flexcms.fullname" . }}-admin
  minReplicas: {{ .Values.admin.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.admin.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.admin.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}

