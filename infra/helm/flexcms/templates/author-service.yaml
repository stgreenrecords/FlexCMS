{{- if .Values.author.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flexcms.fullname" . }}-author
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flexcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: author
spec:
  type: {{ .Values.author.service.type }}
  ports:
    - port: {{ .Values.author.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "flexcms.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: author
{{- end }}

