{{/*
  Credentials Secret — only rendered when values are provided directly
  (i.e., no existingSecret references override them).
  In production, prefer --set with a secrets manager or Sealed Secrets.
*/}}
{{- $renderSecret := false }}
{{- if and (not .Values.postgresql.existingSecret) .Values.postgresql.password }}
  {{- $renderSecret = true }}
{{- end }}
{{- if and (not .Values.rabbitmq.existingSecret) .Values.rabbitmq.password }}
  {{- $renderSecret = true }}
{{- end }}
{{- if and (not .Values.s3.existingSecret) (or .Values.s3.accessKeyId .Values.s3.secretAccessKey) }}
  {{- $renderSecret = true }}
{{- end }}
{{- if $renderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flexcms.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flexcms.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.postgresql.existingSecret }}
  postgresql-password: {{ .Values.postgresql.password | b64enc | quote }}
  {{- end }}
  {{- if not .Values.rabbitmq.existingSecret }}
  rabbitmq-password: {{ .Values.rabbitmq.password | b64enc | quote }}
  {{- end }}
  {{- if not .Values.s3.existingSecret }}
  s3-access-key-id: {{ .Values.s3.accessKeyId | b64enc | quote }}
  s3-secret-access-key: {{ .Values.s3.secretAccessKey | b64enc | quote }}
  {{- end }}
{{- end }}

