# ==============================================================================
# FlexCMS Helm Chart — Production Environment Overrides
# ==============================================================================
# Apply with: helm upgrade --install flexcms ./flexcms -f values-prod.yaml \
#   --set postgresql.password=$DB_PASSWORD \
#   --set rabbitmq.password=$MQ_PASSWORD \
#   --set s3.secretAccessKey=$S3_SECRET

image:
  backend:
    pullPolicy: Always
  admin:
    pullPolicy: Always

author:
  replicaCount: 2
  resources:
    requests:
      cpu: "1000m"
      memory: "1024Mi"
    limits:
      cpu: "4000m"
      memory: "2048Mi"
  # Spread author pods across AZs
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: author
            topologyKey: topology.kubernetes.io/zone

publish:
  replicaCount: 5
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "1536Mi"
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 3
  # Spread publish pods across AZs for HA
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: publish
          topologyKey: topology.kubernetes.io/zone

admin:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

ingress:
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Enable cert-manager for automatic TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.flexcms.example.com
      paths:
        - path: /api/content
          pathType: Prefix
          backend: publish
        - path: /graphql
          pathType: Prefix
          backend: publish
        - path: /graphiql
          pathType: Exact
          backend: publish
        - path: /dam/renditions
          pathType: Prefix
          backend: publish
        - path: /actuator/health
          pathType: Prefix
          backend: publish
    - host: author.flexcms.example.com
      paths:
        - path: /
          pathType: Prefix
          backend: author
    - host: admin.flexcms.example.com
      paths:
        - path: /
          pathType: Prefix
          backend: admin
  tls:
    - secretName: flexcms-tls-prod
      hosts:
        - api.flexcms.example.com
        - author.flexcms.example.com
        - admin.flexcms.example.com

postgresql:
  host: "flexcms-rds.cluster.example.com"  # RDS endpoint
  port: 5432
  username: "flexcms"

redis:
  host: "flexcms-redis.cache.example.com"  # ElastiCache endpoint

rabbitmq:
  host: "b-xxxx.mq.eu-central-1.amazonaws.com"  # Amazon MQ endpoint
  port: 5671  # TLS port for Amazon MQ
  username: "flexcms"

s3:
  endpoint: ""   # Use native AWS S3 (no custom endpoint)
  bucket: "flexcms-assets-prod"
  region: "eu-central-1"

elasticsearch:
  uris: "https://flexcms-es.es.amazonaws.com"  # Amazon OpenSearch / Elasticsearch

security:
  jwt:
    issuerUri: "https://keycloak.example.com/realms/flexcms"

flexcms:
  publish:
    cacheWarming:
      enabled: true
      concurrency: 8
      connectTimeoutMs: 5000
      readTimeoutMs: 15000

