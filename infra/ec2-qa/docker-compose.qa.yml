version: '3.9'

# =============================================================================
# FlexCMS QA — Single-instance Docker Compose deployment
# Runs on one EC2 instance. Same topology as local dev.
#
# Usage:
#   cp init-db.sql /opt/flexcms/init-db.sql
#   cp docker-compose.qa.yml /opt/flexcms/docker-compose.yml
#   cd /opt/flexcms && docker compose up -d
#
# Override passwords via environment:
#   DB_PASSWORD=... MQ_PASSWORD=... docker compose up -d
# =============================================================================

services:
  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    container_name: flexcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flexcms
      POSTGRES_USER: flexcms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-FlexCmsQA2024!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexcms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flexcms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flexcms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: flexcms
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-FlexCmsQA2024!}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: flexcms-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/flexcms-assets;
      mc mb --ignore-existing local/flexcms-static;
      echo 'MinIO buckets created';
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: flexcms-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=flexcms-qa
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- FlexCMS Application ---

  author:
    image: ghcr.io/stgreenrecords/flexcms-app:latest
    container_name: flexcms-author
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: author,local
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_author
      SPRING_DATASOURCE_USERNAME: flexcms
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-FlexCmsQA2024!}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: flexcms
      SPRING_RABBITMQ_PASSWORD: ${MQ_PASSWORD:-FlexCmsQA2024!}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      FLEXCMS_PIM_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_pim
      FLEXCMS_PIM_DATASOURCE_USERNAME: flexcms
      FLEXCMS_PIM_DATASOURCE_PASSWORD: ${DB_PASSWORD:-FlexCmsQA2024!}
      FLEXCMS_DAM_S3_ENDPOINT: http://minio:9000
      FLEXCMS_DAM_S3_ACCESS_KEY: minioadmin
      FLEXCMS_DAM_S3_SECRET_KEY: minioadmin
      FLEXCMS_DAM_S3_BUCKET: flexcms-assets
      FLEXCMS_DAM_S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  publish:
    image: ghcr.io/stgreenrecords/flexcms-app:latest
    container_name: flexcms-publish
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: publish,local
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_publish
      SPRING_DATASOURCE_USERNAME: flexcms
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-FlexCmsQA2024!}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: flexcms
      SPRING_RABBITMQ_PASSWORD: ${MQ_PASSWORD:-FlexCmsQA2024!}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      FLEXCMS_PIM_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexcms_pim
      FLEXCMS_PIM_DATASOURCE_USERNAME: flexcms
      FLEXCMS_PIM_DATASOURCE_PASSWORD: ${DB_PASSWORD:-FlexCmsQA2024!}
      FLEXCMS_DAM_S3_ENDPOINT: http://minio:9000
      FLEXCMS_DAM_S3_ACCESS_KEY: minioadmin
      FLEXCMS_DAM_S3_SECRET_KEY: minioadmin
      FLEXCMS_DAM_S3_BUCKET: flexcms-assets
      FLEXCMS_DAM_S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # --- Frontend Apps ---

  admin:
    image: ghcr.io/stgreenrecords/flexcms-admin:latest
    container_name: flexcms-admin
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_FLEXCMS_API: http://api.flexcmsdemo.store
      NEXT_PUBLIC_FLEXCMS_PUBLISH_URL: http://publish.flexcmsdemo.store
      NEXT_PUBLIC_FLEXCMS_SITE_URL: http://flexcmsdemo.store
    depends_on:
      - author

  site:
    image: ghcr.io/stgreenrecords/flexcms-site:latest
    container_name: flexcms-site
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NEXT_PUBLIC_FLEXCMS_API: http://author:8080
      NEXT_PUBLIC_FLEXCMS_PUBLISH_URL: http://publish:8081
      PORT: "3001"
    depends_on:
      - author

  # --- Reverse Proxy ---

  nginx:
    image: nginx:alpine
    container_name: flexcms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - author
      - publish
      - admin
      - site

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  es_data:

