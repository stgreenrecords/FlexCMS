server_names_hash_bucket_size 128;

# ─── Admin UI: admin.flexcmsdemo.store ───
server {
    listen 80;
    server_name admin.flexcmsdemo.store admin.localhost;

    location / {
        proxy_pass http://admin:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── Author API: api.flexcmsdemo.store ───
server {
    listen 80;
    server_name api.flexcmsdemo.store api.localhost;

    client_max_body_size 100m;

    location / {
        proxy_pass http://author:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Publish API: publish.flexcmsdemo.store ───
server {
    listen 80;
    server_name publish.flexcmsdemo.store publish.localhost;

    location / {
        proxy_pass http://publish:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Reference Site: flexcmsdemo.store (default) ───
server {
    listen 80 default_server;
    server_name flexcmsdemo.store www.flexcmsdemo.store _;

    location / {
        proxy_pass http://site:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

